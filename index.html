<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Trail to Eagle</title>
    <meta name="description" content="Your Boy Scout quest tracker — every rank, every merit badge, every step of the trail.">
    <meta name="theme-color" content="#1B4332">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Trail to Eagle">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <style>
        /* ═══════════════════════════════════════
           SCOUT TRAIL — BSA Colors, RPG Energy
           ═══════════════════════════════════════ */
        :root {
            --bsa-khaki: #C3B091;
            --bsa-khaki-dark: #A89070;
            --bsa-green: #1B4332;
            --bsa-green-mid: #2D6A4F;
            --bsa-green-light: #40916C;
            --bsa-gold: #D4A017;
            --bsa-gold-light: #F0C75E;
            --bsa-red: #C1121F;
            --bsa-red-light: #E5383B;
            --bsa-blue: #023E8A;
            --bsa-orange: #E76F51;
            --bsa-bg: #0D1B12;
            --bsa-card: #162920;
            --bsa-card-hover: #1E3A2D;
            --bsa-text: #E8E0D0;
            --bsa-text-muted: #9CA3AF;
            --bsa-border: #2D6A4F;
            --bsa-shadow: rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { font-size: 16px; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bsa-bg);
            color: var(--bsa-text);
            min-height: 100dvh;
            overflow-x: hidden;
        }

        /* ═══ HEADER ═══ */
        .app-header {
            background: linear-gradient(135deg, var(--bsa-green), var(--bsa-green-mid));
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px var(--bsa-shadow);
        }

        .app-header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--bsa-gold);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .app-header .scout-icon {
            font-size: 1.5rem;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .header-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--bsa-text);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .header-btn:hover, .header-btn:active {
            background: rgba(255,255,255,0.2);
        }

        /* ═══ NAV ═══ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bsa-green);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 max(8px, env(safe-area-inset-bottom));
            z-index: 100;
            box-shadow: 0 -2px 12px var(--bsa-shadow);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 6px 12px;
            color: var(--bsa-text-muted);
            text-decoration: none;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px;
        }

        .nav-item .nav-icon { font-size: 1.4rem; }
        .nav-item.active { color: var(--bsa-gold); }
        .nav-item.active .nav-icon { transform: scale(1.1); }

        /* ═══ PAGES ═══ */
        .page { 
            display: none; 
            padding: 20px 16px 100px;
            max-width: 600px;
            margin: 0 auto;
            animation: fadeIn 0.25s ease;
        }
        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ═══ HOME / DASHBOARD ═══ */
        .scout-badge {
            text-align: center;
            padding: 24px 0;
        }

        .scout-badge .rank-emblem {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--bsa-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 2.8rem;
            box-shadow: 0 4px 20px rgba(212,160,23,0.3);
            position: relative;
        }

        .scout-badge .rank-emblem::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 3px solid var(--bsa-gold-light);
        }

        .scout-badge .rank-name {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--bsa-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .scout-badge .rank-subtitle {
            font-size: 0.85rem;
            color: var(--bsa-text-muted);
            margin-top: 4px;
        }

        /* ═══ PROGRESS BARS ═══ */
        .progress-section {
            margin: 20px 0;
        }

        .progress-card {
            background: var(--bsa-card);
            border: 1px solid var(--bsa-border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .progress-card:hover, .progress-card:active {
            background: var(--bsa-card-hover);
            transform: translateY(-1px);
        }

        .progress-card .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .progress-card .card-title {
            font-size: 1rem;
            font-weight: 700;
        }

        .progress-card .card-subtitle {
            font-size: 0.75rem;
            color: var(--bsa-text-muted);
        }

        .progress-card .card-pct {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--bsa-gold);
        }

        .progress-bar-track {
            background: rgba(255,255,255,0.08);
            border-radius: 6px;
            height: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(90deg, var(--bsa-green-light), var(--bsa-gold));
        }

        .progress-bar-fill.complete {
            background: linear-gradient(90deg, var(--bsa-gold), var(--bsa-gold-light));
        }

        /* ═══ TRAIL PATH ═══ */
        .trail-path {
            position: relative;
            padding: 20px 0;
        }

        .trail-path::before {
            content: '';
            position: absolute;
            left: 24px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--bsa-border);
        }

        .trail-node {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 0;
            position: relative;
        }

        .trail-node .node-marker {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
        }

        .trail-node .node-marker.completed {
            background: var(--bsa-gold);
            color: var(--bsa-green);
            box-shadow: 0 2px 10px rgba(212,160,23,0.3);
        }

        .trail-node .node-marker.current {
            background: var(--bsa-green-light);
            color: white;
            box-shadow: 0 0 0 4px rgba(64,145,108,0.3);
            animation: pulse 2s infinite;
        }

        .trail-node .node-marker.locked {
            background: var(--bsa-card);
            color: var(--bsa-text-muted);
            border: 2px solid var(--bsa-border);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 4px rgba(64,145,108,0.3); }
            50% { box-shadow: 0 0 0 8px rgba(64,145,108,0.1); }
        }

        .trail-node .node-info {
            flex: 1;
        }

        .trail-node .node-name {
            font-weight: 700;
            font-size: 1rem;
        }

        .trail-node .node-status {
            font-size: 0.8rem;
            color: var(--bsa-text-muted);
        }

        .trail-node .node-status.completed {
            color: var(--bsa-gold);
        }

        /* ═══ REQUIREMENT LIST ═══ */
        .req-section {
            margin-bottom: 24px;
        }

        .req-section-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--bsa-text-muted);
            padding: 12px 0 8px;
            border-bottom: 1px solid var(--bsa-border);
            margin-bottom: 8px;
        }

        .req-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 6px;
            transition: background 0.2s;
            cursor: pointer;
        }

        .req-item:hover, .req-item:active {
            background: var(--bsa-card);
        }

        .req-item.checked {
            opacity: 0.6;
        }

        .req-item.checked .req-text {
            text-decoration: line-through;
        }

        .req-checkbox {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: 2px solid var(--bsa-border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .req-item.checked .req-checkbox {
            background: var(--bsa-gold);
            border-color: var(--bsa-gold);
            color: var(--bsa-green);
            animation: checkPop 0.3s ease;
        }

        @keyframes checkPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .req-text {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .req-number {
            font-weight: 700;
            color: var(--bsa-gold);
        }

        .req-note-btn {
            background: none;
            border: 1px solid var(--bsa-border);
            color: var(--bsa-text-muted);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            margin-top: 4px;
            display: inline-block;
        }

        .req-note-btn:hover {
            border-color: var(--bsa-gold);
            color: var(--bsa-gold);
        }

        .req-note-area {
            display: none;
            margin-top: 6px;
        }

        .req-note-area.open {
            display: block;
        }

        .req-note-area textarea {
            width: 100%;
            background: var(--bsa-bg);
            border: 1px solid var(--bsa-border);
            border-radius: 8px;
            color: var(--bsa-text);
            padding: 8px;
            font-size: 0.85rem;
            resize: vertical;
            min-height: 60px;
        }

        .req-note-area textarea:focus {
            outline: none;
            border-color: var(--bsa-gold);
        }

        /* ═══ MERIT BADGE GRID ═══ */
        .mb-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .mb-card {
            background: var(--bsa-card);
            border: 1px solid var(--bsa-border);
            border-radius: 12px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mb-card:hover, .mb-card:active {
            background: var(--bsa-card-hover);
            transform: translateY(-2px);
        }

        .mb-card.earned {
            border-color: var(--bsa-gold);
            box-shadow: 0 0 12px rgba(212,160,23,0.2);
        }

        .mb-card .mb-icon {
            font-size: 2rem;
            margin-bottom: 6px;
        }

        .mb-card .mb-name {
            font-size: 0.8rem;
            font-weight: 600;
            line-height: 1.2;
        }

        .mb-card .mb-eagle {
            font-size: 0.65rem;
            color: var(--bsa-gold);
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .mb-card .mb-progress {
            font-size: 0.7rem;
            color: var(--bsa-text-muted);
            margin-top: 4px;
        }

        .mb-card.earned .mb-progress {
            color: var(--bsa-gold);
        }

        /* ═══ SEARCH ═══ */
        .search-bar {
            position: relative;
            margin-bottom: 16px;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: var(--bsa-card);
            border: 1px solid var(--bsa-border);
            border-radius: 12px;
            color: var(--bsa-text);
            font-size: 1rem;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--bsa-gold);
        }

        .search-bar input::placeholder {
            color: var(--bsa-text-muted);
        }

        .search-bar .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            color: var(--bsa-text-muted);
        }

        /* ═══ FILTER PILLS ═══ */
        .filter-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
        }

        .filter-pill {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            border: 1px solid var(--bsa-border);
            background: var(--bsa-card);
            color: var(--bsa-text-muted);
            transition: all 0.2s;
        }

        .filter-pill.active {
            background: var(--bsa-gold);
            color: var(--bsa-green);
            border-color: var(--bsa-gold);
        }

        /* ═══ MODAL / DETAIL VIEW ═══ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-overlay.open {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .modal-content {
            background: var(--bsa-bg);
            border: 1px solid var(--bsa-border);
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px 20px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-close {
            float: right;
            background: var(--bsa-card);
            border: 1px solid var(--bsa-border);
            color: var(--bsa-text);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--bsa-red);
            border-color: var(--bsa-red);
        }

        /* ═══ CELEBRATION ═══ */
        .celebration {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 300;
            pointer-events: none;
        }

        .celebration.active {
            display: block;
            animation: celebFade 2s forwards;
        }

        @keyframes celebFade {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        .celeb-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: 900;
            color: var(--bsa-gold);
            text-shadow: 0 2px 20px rgba(212,160,23,0.5);
            text-align: center;
            animation: celebBounce 0.6s ease;
        }

        @keyframes celebBounce {
            0% { transform: translate(-50%, -50%) scale(0.3); }
            50% { transform: translate(-50%, -50%) scale(1.2); }
            70% { transform: translate(-50%, -50%) scale(0.9); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* ═══ STATS ═══ */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 16px 0;
        }

        .stat-box {
            background: var(--bsa-card);
            border: 1px solid var(--bsa-border);
            border-radius: 10px;
            padding: 14px 10px;
            text-align: center;
        }

        .stat-box .stat-num {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--bsa-gold);
        }

        .stat-box .stat-label {
            font-size: 0.65rem;
            color: var(--bsa-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* ═══ STREAK ═══ */
        .streak-banner {
            background: linear-gradient(135deg, var(--bsa-green), var(--bsa-green-mid));
            border: 1px solid var(--bsa-gold);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 16px 0;
        }

        .streak-banner .streak-num {
            font-size: 2rem;
            font-weight: 900;
            color: var(--bsa-gold);
        }

        .streak-banner .streak-label {
            font-size: 0.85rem;
            color: var(--bsa-text);
        }

        /* ═══ SETTINGS ═══ */
        .settings-item {
            background: var(--bsa-card);
            border: 1px solid var(--bsa-border);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .settings-item:hover {
            background: var(--bsa-card-hover);
        }

        .settings-item .label {
            font-weight: 600;
        }

        .settings-item .value {
            color: var(--bsa-text-muted);
            font-size: 0.85rem;
        }

        /* ═══ EMPTY STATE ═══ */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--bsa-text-muted);
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        /* ═══ SECTION HEADERS ═══ */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .section-header h2 {
            font-size: 1.15rem;
            font-weight: 800;
        }

        .section-header .see-all {
            color: var(--bsa-gold);
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 600;
        }

        /* ═══ RESPONSIVE ═══ */
        @media (min-width: 768px) {
            .page { padding: 24px 24px 100px; }
            .mb-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
        }

        /* ═══ SCROLLBAR ═══ */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bsa-border); border-radius: 4px; }

        /* ═══ RESET BUTTON ═══ */
        .btn-danger {
            background: var(--bsa-red);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn-primary {
            background: var(--bsa-green-mid);
            color: var(--bsa-text);
            border: 1px solid var(--bsa-border);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<!-- ═══ CELEBRATION OVERLAY ═══ -->
<div class="celebration" id="celebration">
    <div class="celeb-text" id="celebText"></div>
</div>

<!-- ═══ HEADER ═══ -->
<header class="app-header">
    <h1><span class="scout-icon">⥈</span> Trail to Eagle</h1>
    <div class="header-actions">
        <button class="header-btn" onclick="app.showPage('settings')">⚙️</button>
    </div>
</header>

<!-- ═══ PAGES ═══ -->
<main>
    <!-- HOME -->
    <div class="page active" id="page-home">
        <div id="homeContent"></div>
    </div>

    <!-- TRAIL (Ranks) -->
    <div class="page" id="page-trail">
        <h2 style="text-align:center; color:var(--bsa-gold); margin-bottom:20px;">🗺️ The Trail to Eagle</h2>
        <div id="trailContent"></div>
    </div>

    <!-- RANK DETAIL -->
    <div class="page" id="page-rank">
        <div id="rankContent"></div>
    </div>

    <!-- MERIT BADGES -->
    <div class="page" id="page-badges">
        <div id="badgesContent"></div>
    </div>

    <!-- BADGE DETAIL -->
    <div class="page" id="page-badge">
        <div id="badgeContent"></div>
    </div>
